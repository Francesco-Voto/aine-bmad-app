server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" always;

    # Long-term cache for Vite content-hashed assets
    location /assets/ {
        add_header Cache-Control "max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy to backend service
    # resolver 127.0.0.11 = Docker's embedded DNS; valid=30s caches the lookup.
    # Using a variable defers DNS resolution to request time so the container
    # can start even when the 'server' hostname is not yet resolvable.
    # IMPORTANT: proxy_pass $backend (no URI path) so nginx forwards the full
    # original URI (/api/todos etc.) unchanged to the backend.
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://server:3000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
